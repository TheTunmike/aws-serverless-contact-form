<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Tunmike Kolawole</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F4F8; color: #252535; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: white; border-radius: 16px; padding: 48px; width: 100%;
      max-width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #E0DCF0; }
    .card h1 { font-size: 24px; font-weight: 700; color: #252535; margin-bottom: 6px; }
    .card p.subtitle { font-size: 14px; color: #484860; margin-bottom: 32px; }
    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #888; margin-bottom: 6px; margin-top: 20px; }
    label:first-of-type { margin-top: 0; }
    input[type="text"], input[type="email"], textarea {
      width: 100%; border: 1.5px solid #E0DCF0; border-radius: 8px; padding: 10px 14px;
      font-size: 14px; font-family: inherit; color: #252535; outline: none;
      transition: border-color 0.15s; background: white; }
    input[type="text"]:focus, input[type="email"]:focus, textarea:focus { border-color: #A8DEC8; }
    textarea { resize: vertical; min-height: 120px; }
    button { width: 100%; margin-top: 24px; padding: 13px; background: #FF9900;
      color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s; font-family: inherit; }
    button:hover { background: #e68a00; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 14px; font-weight: 600;
      text-align: center; min-height: 20px; }
    .status-success { color: #1a6644; }
    .status-error { color: #a03030; }
    .status-sending { color: #484860; }
    .footer { margin-top: 32px; padding-top: 20px; border-top: 1px solid #E0DCF0;
      font-size: 12px; color: #aaa; text-align: center; }
    .footer a { color: #484860; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
    .powered { margin-top: 8px; font-size: 11px; color: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Get in touch</h1>
    <p class="subtitle">I will get back to you as soon as I can.</p>
    <label for="name">Your name</label>
    <input type="text" id="name" placeholder="Ayo Okafor" autocomplete="name">
    <label for="email">Your email</label>
    <input type="email" id="email" placeholder="ayo@email.com" autocomplete="email">
    <label for="msg">Message</label>
    <textarea id="msg" placeholder="What would you like to say?"></textarea>
    <button id="btn">Send Message</button>
    <p id="status"></p>
    <div class="footer">
      <a href="https://github.com/thetunmike" target="_blank">github.com/thetunmike</a>
      &nbsp;·&nbsp;
      <a href="https://linkedin.com/in/oluwatunmike-kolawole" target="_blank">LinkedIn</a>
      <div class="powered">Powered by AWS Lambda + SES + API Gateway</div>
    </div>
  </div>
  <script>
    document.getElementById("btn").onclick = async function() {
      const btn    = document.getElementById("btn");
      const status = document.getElementById("status");
      const name   = document.getElementById("name").value.trim();
      const email  = document.getElementById("email").value.trim();
      const msg    = document.getElementById("msg").value.trim();
      if (!name || !email || !msg) {
        status.textContent = "Please fill in all fields.";
        status.className = "status-error";
        return;
      }
      btn.disabled = true;
      btn.textContent = "Sending...";
      status.textContent = "Sending your message...";
      status.className = "status-sending";
      try {
        const response = await fetch(
          "https://fdi7owkii1.execute-api.us-east-1.amazonaws.com/prod/contact",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, message: msg })
          }
        );
        if (response.ok) {
          status.textContent = "Message sent! I will get back to you soon.";
          status.className = "status-success";
          document.getElementById("name").value = "";
          document.getElementById("email").value = "";
          document.getElementById("msg").value = "";
        } else {
          throw new Error("Server error");
        }
      } catch(e) {
        status.textContent = "Something went wrong. Please try again.";
        status.className = "status-error";
      }
      btn.disabled = false;
      btn.textContent = "Send Message";
    };
  </script>
</body>
</html>
